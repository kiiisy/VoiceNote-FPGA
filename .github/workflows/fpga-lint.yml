name: FPGA Lint

on:
  pull_request:
    paths:
      - "src/myip/arec_1_0/hdl/**/*.v"
      - "src/myip/arec_1_0/hdl/**/*.sv"
      - "src/myip/arec_1_0/hdl/**/*.vh"
      - "src/myip/arec_1_0/hdl/**/*.svh"
      - ".config/fpga/**"
      - ".github/workflows/fpga-lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup OSS CAD Suite
        uses: YosysHQ/setup-oss-cad-suite@v3

      - name: Show tool versions
        run: |
          which verilator || true
          which verible-verilog-lint || true
          verilator --version || true
          verible-verilog-lint --version || true

      - name: Verilator lint
        run: |
          verilator --lint-only -Wall -f .config/fpga/verilator.f
