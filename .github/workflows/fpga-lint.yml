name: FPGA Lint

on:
  pull_request:
    paths:
      - "src/myip/arec_1_0/hdl/**/*.v"
      - "src/myip/arec_1_0/hdl/**/*.sv"
      - "src/myip/arec_1_0/hdl/**/*.vh"
      - "src/myip/arec_1_0/hdl/**/*.svh"
      - ".config/fpga/**"
      - ".github/workflows/fpga-lint.yml"
      - ".github/scripts/verilator_to_reviewdog.py"

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup OSS CAD Suite
        uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1

      - name: Show tool versions
        run: |
          verilator --version
          reviewdog -version

      - name: Build Verilator file list
        run: |
          mkdir -p .tmp
          {
            echo "+incdir+src/myip/arec_1_0/hdl"
            find src/myip/arec_1_0/hdl \
              -type f \( -name "*.v" -o -name "*.sv" -o -name "*.vh" -o -name "*.svh" \) \
              | sort
          } > .tmp/verilator.f

          echo "===== .tmp/verilator.f ====="
          cat .tmp/verilator.f

      - name: Run Verilator lint
        id: verilator
        run: |
          set +e
          verilator --lint-only -Wall -f .tmp/verilator.f 2>&1 | tee .tmp/verilator.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Convert Verilator log for reviewdog
        run: |
          python3 .github/scripts/verilator_to_reviewdog.py < .tmp/verilator.log > .tmp/verilator.rd || true
          echo "===== .tmp/verilator.rd ====="
          cat .tmp/verilator.rd || true

      - name: Report diagnostics to GitHub Checks
        if: always()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s .tmp/verilator.rd ]; then
            reviewdog \
              -efm="%f:%l:%c: %m" \
              -name="verilator" \
              -reporter=github-pr-check \
              -filter-mode=added \
              -level=warning \
              < .tmp/verilator.rd
          else
            echo "No Verilator diagnostics to report."
          fi

      - name: Fail job if Verilator found issues
        if: steps.verilator.outputs.status != '0'
        run: |
          echo "Verilator reported lint issues."
          exit 1
